<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout com CSS Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        * {
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        .container-fluid {
            display: grid;
            grid-template-areas:
                "header header header"
                "sidebar main main"
                "footer footer footer";
            grid-template-columns: 15rem 1fr 1fr;
            grid-template-rows: 5rem auto 4rem;
            height: 100vh;
            padding: 0; /* importante */
        }

        .header {
            grid-area: header;
            background: #333;
            color: #eee;
            text-align: center;
            padding: 1rem;
        }

        .sidebar {
            grid-area: sidebar;
            background: #555;
            color: #eee;
            padding: 1rem;
        }

        .main {
            grid-area: main;
            background: #ddd;
            padding: 1rem;
        }

        .footer {
            grid-area: footer;
            background: #333;
            color: #eee;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="header">Logo | Título | Menu</div>
        <div class="sidebar">Menu Lateral</div>
        <div class="main">
            <div class="row">

                <div class="col-md-auto">
                    <div class="card" style="width: 18rem;">
                        <img src="https://p1-ofp.static.pub//fes/cms/2025/07/23/4r07xtr3hmvs25vqczyqzwvrkqhnu2341217.png"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Notebook</h5>
                            <p class="card-text">
                                Notebook Dell 8Gb de ram 1Tb Memoria
                            </p>
                    
                            <div class="text-center">
                                <a href="#" class="btn btn-primary">Comprar</a>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="col-md-auto">
                    <div class="card" style="width: 18rem;">
                        <img src="https://p1-ofp.static.pub//fes/cms/2025/07/23/4r07xtr3hmvs25vqczyqzwvrkqhnu2341217.png"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Notebook</h5>
                            <p class="card-text">

                            </p>

                            <div class="text-center">
                                <a href="#" class="btn btn-primary">Comprar</a>
                            </div>

                        </div>
                    </div>
                </div>

                <div class="col-md-auto">
                    <div class="card" style="width: 18rem;">
                        <img src="https://p1-ofp.static.pub//fes/cms/2025/07/23/4r07xtr3hmvs25vqczyqzwvrkqhnu2341217.png"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Notebook</h5>
                            <p class="card-text">

                            </p>
                            <div class="text-center">
                                <a href="#" class="btn btn-primary">Comprar</a>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
        <div class="footer">Rodapé</div>
    </div>
</body>

</html>
